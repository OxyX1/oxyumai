<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 20px;
        }

        html, body {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: rgb(14, 14, 14);
        }

        .container {
            display: flex;
            height: 80vh;
            width: 100vw;
        }

        .sidebar {
            background: rgb(25, 25, 25);
            width: 150px;
            height: 80vh;
            flex-shrink: 0;
        }

        .chatbox {
            background: rgb(25, 25, 25);
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 20px;
        }

        .chat-input {
            background: rgb(25, 25, 25);
            width: 100vw;
            height: 50px;
            position: absolute;
            bottom: 0;
            left: 0;
        }
    </style>
    <title>oxyumai</title>
</head>
<body>
    <div class="container">
        <div class="sidebar" id="sidebar"></div>
        <div class="chatbox" id="chatbox">Main Chat Content</div>
    </div>
    <div class="chat-input" id="chat-input"></div>
    <script>
        
    </script>
</body>
</html>
