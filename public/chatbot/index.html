<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: #121212;
            color: #d6d6d6;
        }

        .container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .sidebar {
            background: #202020;
            width: 250px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
        }

        .chatbox {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 20px;
            background: #202020;
        }

        .chat-input {
            display: flex;
            justify-content: center;
            align-items: center;
            background: #202020;
            padding: 10px;
            border-top: 1px solid #404040;
        }

        .chat-input input {
            width: 90%;
            padding: 10px;
            border: none;
            background: #303030;
            color: #d6d6d6;
            border-radius: 15px;
        }

        .chat-input input:focus {
            outline: none;
        }

        .chatbox .message {
            margin: 10px 0;
            padding: 10px;
            border-radius: 15px;
            background: #303030;
        }
    </style>
    <title>oxyumai</title>
</head>
<body>
    <div class="container">
        <div class="sidebar" id="sidebar">
            <!-- Sidebar content goes here -->
        </div>
        <div class="chatbox" id="chatbox">
            <div class="message">Main Chat Content</div>
        </div>
    </div>
    <div class="chat-input" id="chat-input">
        <input type="text" placeholder="Type a message..." />
    </div>
    <script>
        // Your JavaScript goes here
    </script>
</body>
</html>
